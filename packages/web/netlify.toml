# Default build - Web Emulator (for jetstart-web.netlify.app)
[build]
  base = "."
  command = "npm install && npm run build --workspace=@jetstart/shared && npm run build --workspace=@jetstart/web"
  publish = "packages/web/dist"

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

[build.environment]
  NODE_VERSION = "20"