name: Version Bump

on:
  workflow_dispatch:
    inputs:
      bump_type:
        description: 'Version bump type'
        required: true
        type: choice
        options:
          - patch
          - minor
          - major

jobs:
  bump-version:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20.x'
          cache: 'npm'

      - name: Configure Git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Bump version
        id: bump
        run: |
          # Get current version from root package.json
          CURRENT_VERSION=$(node -p "require('./package.json').version")
          echo "Current version: $CURRENT_VERSION"

          # Calculate new version using semver logic
          IFS='.' read -ra VERSION_PARTS <<< "$CURRENT_VERSION"
          MAJOR="${VERSION_PARTS[0]}"
          MINOR="${VERSION_PARTS[1]}"
          PATCH="${VERSION_PARTS[2]}"

          if [ "${{ github.event.inputs.bump_type }}" == "major" ]; then
            MAJOR=$((MAJOR + 1))
            MINOR=0
            PATCH=0
          elif [ "${{ github.event.inputs.bump_type }}" == "minor" ]; then
            MINOR=$((MINOR + 1))
            PATCH=0
          else
            PATCH=$((PATCH + 1))
          fi

          NEW_VERSION="$MAJOR.$MINOR.$PATCH"
          echo "New version: $NEW_VERSION"
          echo "version=$NEW_VERSION" >> $GITHUB_OUTPUT

          # Update all package.json files directly
          # Root package.json
          node -e "const pkg = require('./package.json'); pkg.version = '$NEW_VERSION'; require('fs').writeFileSync('./package.json', JSON.stringify(pkg, null, 2) + '\n');"

          # packages/shared/package.json
          node -e "const pkg = require('./packages/shared/package.json'); pkg.version = '$NEW_VERSION'; require('fs').writeFileSync('./packages/shared/package.json', JSON.stringify(pkg, null, 2) + '\n');"

          # packages/core/package.json (update version and @jetstart/shared dependency)
          node -e "const pkg = require('./packages/core/package.json'); pkg.version = '$NEW_VERSION'; pkg.dependencies['@jetstart/shared'] = '$NEW_VERSION'; require('fs').writeFileSync('./packages/core/package.json', JSON.stringify(pkg, null, 2) + '\n');"

          # packages/cli/package.json (update version and @jetstart/shared dependency)
          node -e "const pkg = require('./packages/cli/package.json'); pkg.version = '$NEW_VERSION'; pkg.dependencies['@jetstart/shared'] = '$NEW_VERSION'; require('fs').writeFileSync('./packages/cli/package.json', JSON.stringify(pkg, null, 2) + '\n');"

      - name: Commit version changes
        run: |
          git add .
          git commit -m "chore(release): v${{ steps.bump.outputs.version }}"
          git tag -a "v${{ steps.bump.outputs.version }}" -m "Release v${{ steps.bump.outputs.version }}"
          git push origin master
          git push origin "v${{ steps.bump.outputs.version }}"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: v${{ steps.bump.outputs.version }}
          name: Release v${{ steps.bump.outputs.version }}
          draft: false
          prerelease: false
          generate_release_notes: true
