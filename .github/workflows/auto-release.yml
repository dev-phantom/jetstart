name: Auto Release

on:
  push:
    branches: [master]

jobs:
  check-and-release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20.x'

      - name: Configure Git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Determine version bump
        id: version
        run: |
          # Get the last tag
          LAST_TAG=$(git describe --tags --abbrev=0 2>/dev/null || echo "v0.0.0")
          echo "Last tag: $LAST_TAG"

          # Get commits since last tag
          COMMITS=$(git log ${LAST_TAG}..HEAD --pretty=format:"%s")
          echo "Commits since last tag:"
          echo "$COMMITS"

          # Determine bump type from commit messages
          BUMP_TYPE="none"

          # Check for breaking changes (major bump)
          if echo "$COMMITS" | grep -qiE "^(feat|fix|chore|refactor|perf|test|docs)(\(.+\))?!:|BREAKING CHANGE:"; then
            BUMP_TYPE="major"
            echo "Found breaking change - MAJOR bump"
          # Check for new features (minor bump)
          elif echo "$COMMITS" | grep -qiE "^feat(\(.+\))?:"; then
            BUMP_TYPE="minor"
            echo "Found feature - MINOR bump"
          # Check for fixes or patches (patch bump)
          elif echo "$COMMITS" | grep -qiE "^(fix|patch)(\(.+\))?:"; then
            BUMP_TYPE="patch"
            echo "Found fix/patch - PATCH bump"
          fi

          echo "bump_type=$BUMP_TYPE" >> $GITHUB_OUTPUT

          # Calculate new version
          CURRENT_VERSION=${LAST_TAG#v}
          IFS='.' read -ra VERSION_PARTS <<< "$CURRENT_VERSION"
          MAJOR="${VERSION_PARTS[0]}"
          MINOR="${VERSION_PARTS[1]}"
          PATCH="${VERSION_PARTS[2]}"

          if [ "$BUMP_TYPE" == "major" ]; then
            MAJOR=$((MAJOR + 1))
            MINOR=0
            PATCH=0
          elif [ "$BUMP_TYPE" == "minor" ]; then
            MINOR=$((MINOR + 1))
            PATCH=0
          elif [ "$BUMP_TYPE" == "patch" ]; then
            PATCH=$((PATCH + 1))
          fi

          NEW_VERSION="$MAJOR.$MINOR.$PATCH"
          echo "new_version=$NEW_VERSION" >> $GITHUB_OUTPUT
          echo "New version will be: $NEW_VERSION"

      - name: Bump version and create release
        if: steps.version.outputs.bump_type != 'none'
        run: |
          NEW_VERSION="${{ steps.version.outputs.new_version }}"

          # Update all package.json files directly
          # Root package.json
          node -e "const pkg = require('./package.json'); pkg.version = '$NEW_VERSION'; require('fs').writeFileSync('./package.json', JSON.stringify(pkg, null, 2) + '\n');"

          # packages/shared/package.json
          node -e "const pkg = require('./packages/shared/package.json'); pkg.version = '$NEW_VERSION'; require('fs').writeFileSync('./packages/shared/package.json', JSON.stringify(pkg, null, 2) + '\n');"

          # packages/core/package.json (update version and @jetstart/shared dependency)
          node -e "const pkg = require('./packages/core/package.json'); pkg.version = '$NEW_VERSION'; pkg.dependencies['@jetstart/shared'] = '$NEW_VERSION'; require('fs').writeFileSync('./packages/core/package.json', JSON.stringify(pkg, null, 2) + '\n');"

          # packages/cli/package.json (update version and @jetstart/shared dependency)
          node -e "const pkg = require('./packages/cli/package.json'); pkg.version = '$NEW_VERSION'; pkg.dependencies['@jetstart/shared'] = '$NEW_VERSION'; require('fs').writeFileSync('./packages/cli/package.json', JSON.stringify(pkg, null, 2) + '\n');"

          # Commit and tag
          git add .
          git commit -m "chore(release): v$NEW_VERSION [skip ci]"
          git tag -a "v$NEW_VERSION" -m "Release v$NEW_VERSION"
          git push origin master
          git push origin "v$NEW_VERSION"

      - name: Create GitHub Release
        if: steps.version.outputs.bump_type != 'none'
        uses: softprops/action-gh-release@v1
        with:
          tag_name: v${{ steps.version.outputs.new_version }}
          name: Release v${{ steps.version.outputs.new_version }}
          draft: false
          prerelease: false
          generate_release_notes: true

      - name: No release needed
        if: steps.version.outputs.bump_type == 'none'
        run: |
          echo "No conventional commits found. Skipping release."
          echo "Use commit prefixes: feat:, fix:, patch:, or BREAKING CHANGE:"
