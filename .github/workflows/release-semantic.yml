name: Release

on:
  push:
    branches: [master, develop]

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      issues: write
      pull-requests: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22.x'
          registry-url: 'https://registry.npmjs.org'

      - name: Install root dependencies only
        run: npm install --package-lock-only --legacy-peer-deps || true

      - name: Install package dependencies separately
        run: |
          cd packages/shared && npm install --legacy-peer-deps
          cd ../core && npm install --legacy-peer-deps
          cd ../cli && npm install --legacy-peer-deps
          cd ../..

      - name: Build packages
        run: |
          npm run build:shared
          npm run build:core
          npm run build:cli

      - name: Run tests
        run: |
          npm test --workspace=packages/shared --if-present
          npm test --workspace=packages/core --if-present
          npm test --workspace=packages/cli --if-present

      - name: Release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: npx semantic-release
